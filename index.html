<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Swiftwater Weather Display - Portrait</title>

  <style>
    /*
      THE SWIFTWATER WEATHER SIGNAGE
      1080x1920 portrait HTML5 weather display for BrightSign.

      Uses Open-Meteo. No API key required.

      To switch background color:
      - useGreenBackground: false = black luxury background
      - useGreenBackground: true  = deep Swiftwater green background
    */

    :root {
      --brand-bg: #050605;
      --brand-green: #0b7200;
      --brand-green-deep: #063f2a;
      --brand-gold: #d8c28a;
      --text-main: #f6f3ea;
      --text-soft: rgba(246, 243, 234, 0.78);
      --text-muted: rgba(246, 243, 234, 0.55);
      --panel-border: rgba(255, 255, 255, 0.16);
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1920px;
      margin: 0;
      overflow: hidden;
      background: var(--brand-bg);
      color: var(--text-main);
      font-family: Inter, Montserrat, Avenir Next, Helvetica Neue, Arial, sans-serif;
    }

    body { position: relative; letter-spacing: 0.01em; }

    .background {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 22% 12%, rgba(216, 194, 138, 0.18), transparent 26%),
        radial-gradient(circle at 86% 28%, rgba(11, 114, 0, 0.30), transparent 34%),
        radial-gradient(circle at 18% 82%, rgba(255, 255, 255, 0.06), transparent 28%),
        linear-gradient(160deg, rgba(0, 0, 0, 0.84), rgba(0, 0, 0, 0.34)),
        var(--brand-bg);
      z-index: 0;
    }

    .background::before {
      content: "";
      position: absolute;
      inset: -8%;
      background:
        linear-gradient(125deg, transparent 0%, rgba(255, 255, 255, 0.055) 42%, transparent 66%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 140px);
      animation: slowDrift 30s linear infinite;
      opacity: 0.42;
    }

    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.08), rgba(0,0,0,0.62));
    }

    @keyframes slowDrift {
      from { transform: translateX(-2%) translateY(-1%); }
      to { transform: translateX(2%) translateY(1%); }
    }

    .screen {
      position: relative;
      z-index: 1;
      width: 1080px;
      height: 1920px;
      padding: 58px 68px 44px;
      display: grid;
      grid-template-rows: auto auto auto auto 1fr auto;
      gap: 22px;
    }

    header { text-align: center; }

    .brand-kicker {
      color: var(--brand-gold);
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing: 0.31em;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .brand-name {
      font-size: 68px;
      line-height: 0.94;
      font-weight: 850;
      letter-spacing: -0.055em;
    }

    .subhead {
      margin-top: 16px;
      font-size: 25px;
      color: var(--text-soft);
      font-weight: 600;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 21px 30px;
      border-radius: 28px;
      background: rgba(255,255,255,0.065);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .clock {
      font-size: 50px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .date {
      text-align: right;
      font-size: 22px;
      line-height: 1.18;
      color: var(--text-soft);
      font-weight: 650;
    }

    .current-panel, .details-panel, .forecast-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.045));
      border: 1px solid var(--panel-border);
      box-shadow: 0 24px 70px var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 38px;
    }

    .current-panel {
      padding: 36px 52px 38px;
      text-align: center;
    }

    .location {
      font-size: 27px;
      color: var(--text-soft);
      font-weight: 650;
    }

    .weather-icon {
      width: 192px;
      height: 192px;
      margin: 18px auto 2px;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 18px 30px rgba(0,0,0,0.30));
    }

    .weather-icon svg { width: 100%; height: 100%; }

    .temp {
      font-size: 176px;
      line-height: 0.84;
      letter-spacing: -0.09em;
      font-weight: 900;
      margin-top: 0;
    }

    .temp span:last-child {
      font-size: 0.31em;
      vertical-align: super;
      margin-left: 8px;
      color: var(--brand-gold);
      letter-spacing: -0.02em;
    }

    .condition {
      margin-top: 14px;
      font-size: 48px;
      line-height: 1.02;
      font-weight: 800;
      letter-spacing: -0.045em;
    }

    .high-low {
      margin-top: 15px;
      font-size: 28px;
      color: var(--text-soft);
      font-weight: 650;
    }

    .details-panel {
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .metric {
      background: rgba(255,255,255,0.075);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      padding: 20px 22px;
      min-height: 98px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-label {
      color: var(--text-muted);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.17em;
      font-weight: 850;
    }

    .metric-value {
      font-size: 34px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: -0.045em;
    }

    .forecast-section {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section-title {
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: var(--brand-gold);
      font-weight: 850;
      text-align: center;
      flex: 0 0 auto;
    }

    .forecast-list {
      display: grid;
      grid-template-rows: repeat(5, minmax(78px, 1fr));
      gap: 12px;
      min-height: 0;
      height: 100%;
    }

    .forecast-card {
      padding: 18px 26px;
      display: grid;
      grid-template-columns: 130px 1fr auto;
      align-items: center;
      gap: 18px;
      overflow: hidden;
      min-height: 78px;
    }

    .forecast-day {
      color: var(--brand-gold);
      font-size: 23px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .forecast-condition {
      color: var(--text-soft);
      font-size: 23px;
      line-height: 1.1;
      font-weight: 650;
    }

    .forecast-temp {
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-size: 42px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.05em;
      min-width: 140px;
      justify-content: flex-end;
    }

    .forecast-low {
      color: var(--text-muted);
      font-size: 0.58em;
    }

    .bottom-note {
      text-align: center;
      color: rgba(246, 243, 234, 0.40);
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .error { color: #ffd7d7; }
  </style>
</head>

<body>
  <div class="background"></div>

  <div class="screen">
    <header>
      <div class="brand-kicker">The Swiftwater</div>
      <div class="brand-name">Today in the Poconos</div>
      <div class="subhead">Local forecast for Swiftwater, Pennsylvania</div>
    </header>

    <div class="time-row">
      <div class="clock" id="clock">--:--</div>
      <div class="date" id="date">Loading date</div>
    </div>

    <section class="current-panel">
      <div class="location" id="location">Swiftwater, Pennsylvania</div>
      <div class="weather-icon" id="weatherIcon" aria-hidden="true"></div>
      <div class="temp"><span id="currentTempNumber">--</span><span>°</span></div>
      <div class="condition" id="condition">Refreshing local forecast</div>
      <div class="high-low" id="highLow">High --° / Low --°</div>
    </section>

    <section class="details-panel">
      <div class="metric"><div class="metric-label">Rain Chance</div><div class="metric-value" id="rainChance">--%</div></div>
      <div class="metric"><div class="metric-label">Wind</div><div class="metric-value" id="windSpeed">-- mph</div></div>
      <div class="metric"><div class="metric-label">Feels Like</div><div class="metric-value" id="feelsLike">--°</div></div>
      <div class="metric"><div class="metric-label">Updated</div><div class="metric-value" id="updatedTime">--</div></div>
    </section>

    <section class="forecast-section">
      <div class="section-title">5 Day Outlook</div>
      <div class="forecast-list" id="forecastCards"></div>
    </section>

    <div class="bottom-note" id="status">Weather powered by Open-Meteo</div>
  </div>

  <script>
    const CONFIG = {
      locationName: "Swiftwater, Pennsylvania",
      latitude: 41.095,
      longitude: -75.325,
      timezone: "America/New_York",
      forecastDays: 5,
      refreshMinutes: 15,
      useGreenBackground: false
    };

    if (CONFIG.useGreenBackground) {
      document.documentElement.style.setProperty("--brand-bg", "#063f2a");
    }

    const WEATHER = {
      0: { label: "Clear skies", icon: "sun" }, 1: { label: "Mostly clear", icon: "sun" },
      2: { label: "Partly cloudy", icon: "partly" }, 3: { label: "Cloudy", icon: "cloud" },
      45: { label: "Foggy", icon: "fog" }, 48: { label: "Icy fog", icon: "fog" },
      51: { label: "Light drizzle", icon: "rain" }, 53: { label: "Drizzle", icon: "rain" }, 55: { label: "Steady drizzle", icon: "rain" },
      56: { label: "Freezing drizzle", icon: "snow" }, 57: { label: "Freezing drizzle", icon: "snow" },
      61: { label: "Light rain", icon: "rain" }, 63: { label: "Rain", icon: "rain" }, 65: { label: "Heavy rain", icon: "rain" },
      66: { label: "Freezing rain", icon: "snow" }, 67: { label: "Freezing rain", icon: "snow" },
      71: { label: "Light snow", icon: "snow" }, 73: { label: "Snow", icon: "snow" }, 75: { label: "Heavy snow", icon: "snow" }, 77: { label: "Snow grains", icon: "snow" },
      80: { label: "Rain showers", icon: "rain" }, 81: { label: "Rain showers", icon: "rain" }, 82: { label: "Heavy showers", icon: "rain" },
      85: { label: "Snow showers", icon: "snow" }, 86: { label: "Snow showers", icon: "snow" },
      95: { label: "Thunderstorms", icon: "storm" }, 96: { label: "Thunderstorms", icon: "storm" }, 99: { label: "Strong storms", icon: "storm" }
    };

    function getWeatherInfo(code) {
      return WEATHER[code] || { label: "Seasonal weather", icon: "partly" };
    }

    function iconSvg(type) {
      const gold = "#d8c28a";
      const cream = "#f6f3ea";
      const icons = {
        sun: `<svg viewBox="0 0 200 200"><circle cx="100" cy="100" r="42" fill="${gold}"/><g stroke="${gold}" stroke-width="10" stroke-linecap="round"><line x1="100" y1="18" x2="100" y2="42"/><line x1="100" y1="158" x2="100" y2="182"/><line x1="18" y1="100" x2="42" y2="100"/><line x1="158" y1="100" x2="182" y2="100"/><line x1="42" y1="42" x2="59" y2="59"/><line x1="141" y1="141" x2="158" y2="158"/><line x1="158" y1="42" x2="141" y2="59"/><line x1="59" y1="141" x2="42" y2="158"/></g></svg>`,
        cloud: `<svg viewBox="0 0 220 180"><path d="M68 135h95c24 0 43-18 43-41s-19-40-42-40c-6 0-12 1-17 4C138 35 116 21 92 26 69 31 52 51 51 75c-22 3-39 22-39 44 0 9 7 16 16 16h40z" fill="${cream}" opacity="0.92"/></svg>`,
        partly: `<svg viewBox="0 0 230 190"><circle cx="76" cy="72" r="36" fill="${gold}"/><g stroke="${gold}" stroke-width="8" stroke-linecap="round"><line x1="76" y1="18" x2="76" y2="35"/><line x1="76" y1="109" x2="76" y2="126"/><line x1="22" y1="72" x2="39" y2="72"/><line x1="113" y1="72" x2="130" y2="72"/></g><path d="M78 150h98c24 0 43-18 43-41s-19-41-43-41c-7 0-14 2-20 5-10-22-33-35-57-30-23 5-40 25-42 49-22 4-38 22-38 43 0 8 7 15 15 15h44z" fill="${cream}" opacity="0.94"/></svg>`,
        rain: `<svg viewBox="0 0 220 210"><path d="M56 118h104c24 0 43-18 43-41s-19-40-42-40c-7 0-13 1-18 4C132 18 110 7 88 12 65 17 48 37 47 61 25 64 9 83 9 104c0 8 6 14 14 14h33z" fill="${cream}" opacity="0.92"/><g stroke="${gold}" stroke-width="9" stroke-linecap="round"><line x1="65" y1="145" x2="48" y2="178"/><line x1="112" y1="145" x2="95" y2="178"/><line x1="158" y1="145" x2="141" y2="178"/></g></svg>`,
        snow: `<svg viewBox="0 0 220 210"><path d="M56 118h104c24 0 43-18 43-41s-19-40-42-40c-7 0-13 1-18 4C132 18 110 7 88 12 65 17 48 37 47 61 25 64 9 83 9 104c0 8 6 14 14 14h33z" fill="${cream}" opacity="0.92"/><g fill="${gold}"><circle cx="62" cy="158" r="7"/><circle cx="112" cy="171" r="7"/><circle cx="160" cy="158" r="7"/></g></svg>`,
        fog: `<svg viewBox="0 0 220 190"><path d="M56 110h104c24 0 43-18 43-41s-19-40-42-40c-7 0-13 1-18 4C132 10 110-1 88 4 65 9 48 29 47 53 25 56 9 75 9 96c0 8 6 14 14 14h33z" fill="${cream}" opacity="0.86"/><g stroke="${gold}" stroke-width="8" stroke-linecap="round" opacity="0.85"><line x1="30" y1="137" x2="190" y2="137"/><line x1="48" y1="163" x2="172" y2="163"/></g></svg>`,
        storm: `<svg viewBox="0 0 220 220"><path d="M56 118h104c24 0 43-18 43-41s-19-40-42-40c-7 0-13 1-18 4C132 18 110 7 88 12 65 17 48 37 47 61 25 64 9 83 9 104c0 8 6 14 14 14h33z" fill="${cream}" opacity="0.92"/><path d="M110 132l-28 47h30l-12 35 42-58h-31l17-24z" fill="${gold}"/></svg>`
      };
      return icons[type] || icons.partly;
    }

    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent = new Intl.DateTimeFormat("en-US", { hour: "numeric", minute: "2-digit", hour12: true, timeZone: CONFIG.timezone }).format(now);
      document.getElementById("date").innerHTML = new Intl.DateTimeFormat("en-US", { weekday: "long", month: "long", day: "numeric", timeZone: CONFIG.timezone }).format(now).replace(", ", "<br>");
    }

    async function fetchWeather() {
      const params = new URLSearchParams({
        latitude: CONFIG.latitude,
        longitude: CONFIG.longitude,
        timezone: CONFIG.timezone,
        temperature_unit: "fahrenheit",
        wind_speed_unit: "mph",
        precipitation_unit: "inch",
        current: "temperature_2m,apparent_temperature,weather_code,wind_speed_10m",
        daily: "weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max",
        forecast_days: CONFIG.forecastDays
      });

      const response = await fetch(`https://api.open-meteo.com/v1/forecast?${params.toString()}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`Weather request failed: ${response.status}`);
      return response.json();
    }

    function round(value) { return Math.round(Number(value)); }

    function renderWeather(data) {
      const current = data.current;
      const daily = data.daily;
      const currentInfo = getWeatherInfo(current.weather_code);

      document.getElementById("location").textContent = CONFIG.locationName;
      document.getElementById("weatherIcon").innerHTML = iconSvg(currentInfo.icon);
      document.getElementById("currentTempNumber").textContent = round(current.temperature_2m);
      document.getElementById("condition").textContent = currentInfo.label;
      document.getElementById("highLow").textContent = `High ${round(daily.temperature_2m_max[0])}° / Low ${round(daily.temperature_2m_min[0])}°`;
      document.getElementById("rainChance").textContent = `${round(daily.precipitation_probability_max[0])}%`;
      document.getElementById("windSpeed").textContent = `${round(current.wind_speed_10m)} mph`;
      document.getElementById("feelsLike").textContent = `${round(current.apparent_temperature)}°`;
      document.getElementById("updatedTime").textContent = new Intl.DateTimeFormat("en-US", { hour: "numeric", minute: "2-digit", hour12: true, timeZone: CONFIG.timezone }).format(new Date());

      const forecastEl = document.getElementById("forecastCards");
      forecastEl.innerHTML = "";

      daily.time.forEach((dateString, index) => {
        if (index >= CONFIG.forecastDays) return;
        const date = new Date(`${dateString}T12:00:00`);
        const day = index === 0 ? "Today" : new Intl.DateTimeFormat("en-US", { weekday: "short", timeZone: CONFIG.timezone }).format(date);
        const info = getWeatherInfo(daily.weather_code[index]);
        const card = document.createElement("div");
        card.className = "forecast-card";
        card.innerHTML = `<div class="forecast-day">${day}</div><div class="forecast-condition">${info.label}</div><div class="forecast-temp"><span>${round(daily.temperature_2m_max[index])}°</span><span class="forecast-low">${round(daily.temperature_2m_min[index])}°</span></div>`;
        forecastEl.appendChild(card);
      });

      document.getElementById("status").classList.remove("error");
      document.getElementById("status").textContent = "Weather powered by Open-Meteo";
    }

    async function refreshWeather() {
      try {
        const data = await fetchWeather();
        renderWeather(data);
      } catch (error) {
        console.error(error);
        document.getElementById("condition").textContent = "Forecast temporarily unavailable";
        document.getElementById("status").classList.add("error");
        document.getElementById("status").textContent = "Weather connection unavailable";
      }
    }

    updateClock();
    refreshWeather();
    setInterval(updateClock, 1000);
    setInterval(refreshWeather, CONFIG.refreshMinutes * 60 * 1000);
  </script>
</body>
</html>
